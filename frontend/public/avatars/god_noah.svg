<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="god-glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fef9c3" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#ca8a04" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="god-face" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </radialGradient>
  </defs>
  <circle cx="32" cy="32" r="32" fill="#0d0a2e"/>
  <!-- Divine radiance rays -->
  <line x1="32" y1="4" x2="32" y2="0" stroke="#eab308" stroke-width="2" opacity="0.8"/>
  <line x1="48" y1="8" x2="52" y2="4" stroke="#eab308" stroke-width="2" opacity="0.7"/>
  <line x1="58" y1="20" x2="63" y2="17" stroke="#eab308" stroke-width="2" opacity="0.6"/>
  <line x1="16" y1="8" x2="12" y2="4" stroke="#eab308" stroke-width="2" opacity="0.7"/>
  <line x1="6" y1="20" x2="1" y2="17" stroke="#eab308" stroke-width="2" opacity="0.6"/>
  <line x1="60" y1="36" x2="64" y2="36" stroke="#eab308" stroke-width="2" opacity="0.5"/>
  <line x1="4" y1="36" x2="0" y2="36" stroke="#eab308" stroke-width="2" opacity="0.5"/>
  <!-- Golden glow -->
  <circle cx="32" cy="32" r="26" fill="url(#god-glow)"/>
  <!-- Crown base -->
  <rect x="14" y="22" width="36" height="7" rx="2" fill="#ca8a04"/>
  <!-- Crown spikes -->
  <polygon points="15,22 19,10 23,22" fill="#eab308"/>
  <polygon points="24,22 28,8 32,22" fill="#fbbf24"/>
  <polygon points="32,22 36,8 40,22" fill="#fbbf24"/>
  <polygon points="41,22 45,10 49,22" fill="#eab308"/>
  <!-- Crown gems -->
  <circle cx="19" cy="11" r="2.5" fill="#ef4444"/>
  <circle cx="32" cy="9" r="2.5" fill="#3b82f6"/>
  <circle cx="45" cy="11" r="2.5" fill="#22c55e"/>
  <!-- Face -->
  <circle cx="32" cy="38" r="16" fill="url(#god-face)"/>
  <!-- All-knowing eyes — glowing white -->
  <ellipse cx="25" cy="35" rx="4" ry="4" fill="white"/>
  <ellipse cx="39" cy="35" rx="4" ry="4" fill="white"/>
  <circle cx="25" cy="35" r="2.5" fill="#fbbf24"/>
  <circle cx="39" cy="35" r="2.5" fill="#fbbf24"/>
  <circle cx="25" cy="35" r="1" fill="#1e1b4b"/>
  <circle cx="39" cy="35" r="1" fill="#1e1b4b"/>
  <!-- Knowing smile -->
  <path d="M 24 44 Q 32 50 40 44" fill="none" stroke="#92400e" stroke-width="2.5" stroke-linecap="round"/>
</svg>
