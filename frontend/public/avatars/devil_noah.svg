<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="dev-face" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#450a0a"/>
    </radialGradient>
    <radialGradient id="dev-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#dc2626" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#450a0a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="32" cy="32" r="32" fill="#1a0000"/>
  <!-- Hellish glow -->
  <circle cx="32" cy="38" r="24" fill="url(#dev-glow)"/>
  <!-- Devil horns -->
  <polygon points="16,28 11,8 25,22" fill="#b91c1c"/>
  <polygon points="48,28 53,8 39,22" fill="#b91c1c"/>
  <!-- Horn shine -->
  <line x1="14" y1="24" x2="13" y2="11" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="50" y1="24" x2="51" y2="11" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Face -->
  <circle cx="32" cy="36" r="20" fill="url(#dev-face)"/>
  <!-- Sinister arched brows -->
  <path d="M 18 26 Q 24 22 29 26" fill="none" stroke="#450a0a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 35 26 Q 40 22 46 26" fill="none" stroke="#450a0a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Glowing eyes -->
  <ellipse cx="25" cy="31" rx="4.5" ry="4" fill="#fef08a"/>
  <ellipse cx="39" cy="31" rx="4.5" ry="4" fill="#fef08a"/>
  <ellipse cx="25" cy="32" rx="2" ry="3.5" fill="#1a0000"/>
  <ellipse cx="39" cy="32" rx="2" ry="3.5" fill="#1a0000"/>
  <!-- Evil grin -->
  <path d="M 22 42 Q 32 52 42 42" fill="#450a0a"/>
  <path d="M 22 42 Q 32 50 42 42" fill="none" stroke="#450a0a" stroke-width="1"/>
  <!-- Fangs -->
  <polygon points="28,42 26,48 30,42" fill="white"/>
  <polygon points="36,42 34,48 38,42" fill="white"/>
  <!-- Pitchfork (tiny, corner) -->
  <line x1="56" y1="8" x2="56" y2="28" stroke="#dc2626" stroke-width="2"/>
  <line x1="52" y1="9" x2="52" y2="16" stroke="#dc2626" stroke-width="2"/>
  <line x1="60" y1="9" x2="60" y2="16" stroke="#dc2626" stroke-width="2"/>
  <line x1="52" y1="9" x2="60" y2="9" stroke="#dc2626" stroke-width="2"/>
</svg>
