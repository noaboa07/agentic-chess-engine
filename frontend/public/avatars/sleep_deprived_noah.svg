<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <circle cx="32" cy="32" r="32" fill="#0f172a"/>
  <!-- Floating Zzz -->
  <text x="50" y="19" font-family="sans-serif" font-size="10" fill="#6366f1" font-weight="bold">Z</text>
  <text x="44" y="12" font-family="sans-serif" font-size="7" fill="#818cf8" font-weight="bold">z</text>
  <text x="56" y="11" font-family="sans-serif" font-size="5" fill="#a5b4fc" font-weight="bold">z</text>
  <!-- Face -->
  <circle cx="32" cy="36" r="20" fill="#cbd5e1"/>
  <!-- Heavy under-eye bags -->
  <ellipse cx="24" cy="36" rx="7" ry="4" fill="#94a3b8" opacity="0.55"/>
  <ellipse cx="40" cy="36" rx="7" ry="4" fill="#94a3b8" opacity="0.55"/>
  <!-- Half-closed eyes (drooping lids) -->
  <ellipse cx="24" cy="33" rx="6" ry="4.5" fill="white"/>
  <ellipse cx="40" cy="33" rx="6" ry="4.5" fill="white"/>
  <path d="M 18 31 Q 24 29 30 31 L 30 33 Q 24 36 18 34 Z" fill="#94a3b8"/>
  <path d="M 34 31 Q 40 29 46 31 L 46 33 Q 40 36 34 34 Z" fill="#94a3b8"/>
  <circle cx="24" cy="34" r="2.2" fill="#334155"/>
  <circle cx="40" cy="34" r="2.2" fill="#334155"/>
  <!-- Sad/flat mouth -->
  <path d="M 26 43 Q 32 45 38 43" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
  <!-- Coffee cup (bottom left) -->
  <rect x="4" y="46" width="13" height="11" rx="2" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <path d="M 17 49 Q 21 49 21 52 Q 21 55 17 55" fill="none" stroke="#475569" stroke-width="1.5"/>
  <path d="M 7 46 Q 8 43 9 45" fill="none" stroke="#94a3b8" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
  <path d="M 11 46 Q 12 42 13 45" fill="none" stroke="#94a3b8" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
</svg>
