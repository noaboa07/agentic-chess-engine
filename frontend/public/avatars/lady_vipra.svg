<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="rb-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <radialGradient id="rb-disc" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#334155"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="url(#rb-bg)"/>
  <!-- Roomba body — top-down disc -->
  <circle cx="32" cy="33" r="22" fill="url(#rb-disc)" stroke="#64748b" stroke-width="1.5"/>
  <!-- Rubber bumper ring (front half) -->
  <path d="M 11 33 A 21 21 0 0 1 53 33" fill="none" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
  <path d="M 11 33 A 21 21 0 0 1 53 33" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Central hub ring -->
  <circle cx="32" cy="35" r="9" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <!-- Spinning brush indicator -->
  <circle cx="32" cy="35" r="5" fill="#0ea5e9" opacity="0.9"/>
  <line x1="32" y1="30" x2="32" y2="35" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="36.5" y1="32.5" x2="32" y2="35" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="27.5" y1="37.5" x2="32" y2="35" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Side brushes (left) -->
  <line x1="12" y1="35" x2="5" y2="31" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="12" y1="35" x2="5" y2="37" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="12" y1="35" x2="6" y2="42" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Side brushes (right) -->
  <line x1="52" y1="35" x2="59" y2="31" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="52" y1="35" x2="59" y2="37" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="52" y1="35" x2="58" y2="42" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round"/>
  <!-- IR sensors (front) -->
  <circle cx="22" cy="16" r="2" fill="#64748b"/>
  <circle cx="32" cy="13" r="2" fill="#64748b"/>
  <circle cx="42" cy="16" r="2" fill="#64748b"/>
  <!-- Status LED -->
  <circle cx="42" cy="48" r="2.5" fill="#22c55e"/>
  <circle cx="42" cy="48" r="4" fill="#22c55e" opacity="0.25"/>
</svg>
